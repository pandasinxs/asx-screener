name: First Pullback Monitor

on:
  schedule:
    - cron: '0,30 1,2,3 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Run pullback monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pullback_monitor.py

      - name: Save alerted log
        run: |
          git config user.name "ASX Bot"
          git config user.email "bot@asx.bot"
          git stash
          git pull --rebase origin main
          git stash pop
          git add alerted.json
          git diff --cached --quiet || git commit -m "Alert log $(date +%Y-%m-%dT%H:%M)"
          git push